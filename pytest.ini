[pytest]
# Only collect tests from the dedicated test suite directory.
#
# Repo root contains various ad-hoc verification scripts named "test_*.py"
# (e.g. test_houk_pipeline.py) which are not pytest tests and may call
# sys.exit() at import time. Limiting discovery to ./tests makes
# `pytest --collect-only` stable and deterministic.
testpaths = tests
