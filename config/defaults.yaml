# ReactionProfileHunter v6.2 默认配置
# =====================================

# ==================== 路径配置 (Executables) ====================
# 统一管理所有量子化学软件的绝对路径
# 支持环境变量覆盖（如 export ORCA_PATH=/custom/path/orca）
executables:
  orca:
    path: "/opt/software/orca/orca"  # 可执行文件的绝对路径，或命令名如 "orca"
    ld_library_path: "/opt/openmpi418/lib:/opt/software/orca"  # OpenMPI 4.1.8 + ORCA 共享库路径
  gaussian:
    path: "/opt/software/gaussian/g16/g16"
    root: "/opt/software/gaussian/g16"
    profile: "/opt/software/gaussian/g16/g16.profile"
    use_wrapper: true
    wrapper_path: "./scripts/run_g16_worker.sh"
  xtb:
    path: "/opt/software/xtb/bin/xtb"
    fallback_paths:
      - "/opt/xtb/bin/xtb"
      - "/usr/local/bin/xtb"
  crest:
    path: "/opt/software/crest/crest"
  isostat:
    path: "/opt/software/molclus/isostat"
  shermo:
    path: "Shermo"

# ==================== 热力学配置 (Thermodynamics) ====================
# Shermo 热力学校正参数，用于 S1 构象搜索和 S3 Gibbs 计算
thermo:
  temperature_k: 298.15
  pressure_atm: 1.0
  scl_zpe: 0.9905
  ilowfreq: 2
  imagreal: null
  conc: null

# ==================== 资源配置 (Resources) ====================
# 内存配置格式："32GB", "16GB", "4096MB" 等
resources:
  mem: "32GB"  # 总内存
  nproc: 16     # 并行核数
  # 派生值（maxcore 等）由代码根据 mem/nproc 自动计算
  orca_maxcore_safety: 0.2  # ORCA maxcore 安全系数（避免内存溢出）

# 全局理论水平配置 (Theory Levels)
# ================================
# 统一管理几何优化和高精度单点能的参数
theory:
  # xTB 预优化级别 (用于避免原子重叠导致 Gaussian/ORCA 崩溃)
  # 策略: xTB 粗修 → B3LYP 精修 → 高精度 SP (Houk 建议)
  # 注意: nproc 从 resources 配置中自动派生
  preoptimization:
    enabled: true  # 是否启用 xTB 预优化（建议开启）
    gfn_level: 2  # GFN-xTB 方法级别 (1 或 2, 推荐 2)
    solvent: acetone  # 与主计算保持一致
    # 原子重叠检测阈值（Å）
    overlap_threshold: 1.0  # 若任意两原子距离 < 此值，触发预优化
    # 优化收敛标准
    opt_level: crude  # crude (快速) / normal (标准) / tight (严格)

  # 几何优化级别 (用于 S1 产物优化, S3 TS 优化, 受限优化)
  # 注意: nproc 和 mem 从 resources 配置中自动派生
  optimization:
    method: B3LYP
    basis: def2-SVP
    dispersion: GD3BJ
    engine: gaussian  # 可选: gaussian, orca
    solvent: acetone

  # 高精度单点能级别 (L2)
  # 用于 S1 产物精修, S3 TS/Reactant/Fragments 精修
  # 注意: nproc 从 resources 配置中自动派生
  single_point:
    method: wB97X-D4  # 改用 wB97X-D3BJ (比 WB97M-V 更稳定)
    basis: def2-TZVPP
    aux_basis: def2/J
    engine: orca  # 可选: orca, gaussian
    maxcore: 1000
    solvent: acetone
    fallback_to_gaussian: false  # ORCA 失败时是否降级到 Gaussian
    fallback_method: B3LYP
    fallback_basis: def2-TZVP

# 优化控制配置 (Optimization Control)
# ===================================
# 统一管理几何优化的各种控制参数
# 这些参数会自动转换为 Gaussian/ORCA 的相应关键词
optimization_control:
  # 超时设置
  timeout:
    enabled: false
    default_seconds: 21600

  # 振荡检测
  oscillation:
    window_size: 10  # 检测窗口（步数）
    energy_tolerance: 0.0001  # Hartree, 能量变化容忍阈值
    max_oscillation_count: 3  # 最大允许振荡次数

  # Hessian 控制
  hessian:
    initial: calcfc  # 初始 Hessian: calcfc, calcall, read, model
    recalc_every: 10  # 每隔 N 步重算 Hessian

  # 步长控制
  step:
    max_step: 30  # Gaussian: N/100 Bohr, ORCA: Bohr
    trust_radius: 0.3  # 信任半径 (Bohr)
    adaptive: true  # 自适应步长

  # 收敛级别
  convergence:
    level: normal  # loose, normal, tight, verytight

  # TS 特定设置
  ts:
    eigentest: false  # Gaussian: NoEigenTest
    follow_mode: 1  # 跟踪第几个虚频 (1 或 2)
    step_type: eigenvalue  # eigenvalue 或 step

# Step 1: Product Anchor (产物锚定)
step1:
  # ==============================================================
  # 两阶段构象搜索配置 (v3.1 新增)
  # 策略: GFN0(快速粗筛) → ISOSTAT(聚类) → GFN2(精细优化)
  # ==============================================================
  conformer_search:
    # 主开关: true=两阶段模式, false=单阶段GFN2(向后兼容)
    two_stage_enabled: true

    # Stage 1: GFN0 粗筛 (快速覆盖构象空间)
    stage1_gfn0:
      enabled: true
      gfn_level: 0  # 使用GFN0快速模式
      energy_window_kcal: 10.0  # 宽松能量窗口,保留更多候选构象
      # CREST专用参数 (额外标志)
      crest_flags: "--niceprint"
      # ISOSTAT聚类配置
      clustering:
        run_after: true
        isostat_gdis: 0.5  # RMSD阈值 (Å)
        isostat_edis: 1.0    # 能量阈值 (kcal/mol)

    # Stage 2: GFN2 精细优化 (仅优化GFN0筛选出的候选)
    stage2_gfn2:
      enabled: true
      gfn_level: 2  # 使用GFN2精细模式
      energy_window_kcal: 3.0  # 严格能量窗口
      crest_flags: "--niceprint"
      # ISOSTAT聚类配置
      clustering:
        run_after: true
        isostat_gdis: 1  # RMSD阈值 (Å)
        isostat_edis: 1.0  # 能量阈值 (kcal/mol)

    # 通用构象搜索参数 (单阶段/两阶段共用)
    common:
      solvent: acetone
      threads: 16
      ngeom_default: 3   # 默认筛选构象数
      ngeom_max: 6     # 最大筛选构象数

  # ==============================================================
  # 遗留配置 (单阶段模式或向后兼容)
  # ==============================================================
  # CREST 构象搜索配置 (单阶段模式使用)
  crest:
    gfn_level: 2  # GFN-xTB 方法级别 (0, 1, 2)
    solvent: acetone
    energy_window: 6.0  # kcal/mol, 构象能量窗口
    threads: 16

  # 是否启用 DFT 优化 (在 CREST 之后)
  enable_dft_opt: true  # 默认使用DFT精修产物构象

# Step 2: Retro Scanner (逆向扫描)
# ================================================
# 职责:
# 1. 从产物结构向外扫描生成 TS 初猜
# 2. 使用 xTB  relaxed scan 探索反应坐标
# 3. 拓扑守护验证扫描轨迹合理性
step2:
  forming_bonds_required: true
  forming_bonds_index_base: auto
  
  # 扫描策略配置
  scan:
    # ===== 扫描策略选择 =====
    # policy_c: 弱双约束 (harmonic, k=0.03) - 推荐，用于难收敛反应
    # policy_a: 单侧自由 (仅约束键B)
    # policy_b: 单侧自由 (仅约束键A, 镜像)
    # concerted: 传统强双约束 (fixed, k=0.5)
    scan_policy: policy_c
    
    # ===== 扫描距离参数 (单位: Angstrom) =====
    # 扫描起点距离 - 通常设为产物形成键距离的1.2-1.5倍
    scan_start_distance: 3.5
    # 扫描终点距离 - 通常设为过渡态典型距离 (1.8-2.0)
    scan_end_distance: 1.8
    # 扫描步数 - 更多步数提高分辨率但增加计算时间
    scan_steps: 20
    
    # ===== 扫描模式 =====
    # concerted: 同时扫描所有形成键 (推荐)
    # sequential: 依次扫描每个形成键
    scan_mode: concerted
    # 扫描约束力常数 - policy_c使用harmonic约束时有效
    scan_force_constant: 0.5
    
    # ===== 拓扑守护配置 (防止扫描轨迹偏离反应路径) =====
    # 启用拓扑守护 - 检测扫描过程中是否产生错误的化学键
    topology_guard_enabled: true
    # 拓扑图缩放因子 - 用于判断原子间距离是否形成新键
    # 值越大判断越宽松 (1.25 = 典型共价键半径的1.25倍)
    topology_graph_scale: 1.25
    # 风险接触阈值 - 用于检测可能形成错误键的原子对
    risk_contact_ratio_threshold: 0.85
    risk_contact_abs_cutoff_A: 2.2
    # 最小收缩比 - 用于检测原子是否过度靠近
    min_shrink_ratio: 0.75
    # 最大风险对数 - 最多检测多少个风险接触
    keep_apart_max_pairs: 6
    # 保持距离下限 - 风险接触的最小距离阈值
    keep_apart_floor_A: 3.0
    # 保持距离约束力常数
    keep_apart_force_constant: 0.5
    # 拓扑重试力常数 - 首次失败后重试时使用的力常数
    keep_apart_retry_force_constant: 1.0
    # 拓扑失败时是否重试一次
    topology_retry_once: true
    
    # ===== 扫描质量控制 =====
    # 有效点数阈值 - 扫描至少需要多少个有效点才能认为成功
    min_valid_points: 5
    
    # ===== 边界处理 =====
    # 是否拒绝边界最大能量点 (即能量最高点在扫描边界)
    reject_boundary_maximum: true
    # 边界最大时是否重试一次 (扩展扫描范围)
    boundary_retry_once: true
    # 边界重试的距离增量 (Angstrom)
    boundary_retry_delta: 0.3
    # 边界重试时额外增加的扫描步数
    boundary_retry_extra_steps: 6
    # 是否允许边界情况下降级处理 (不抛错, 仅记录warning)
    allow_boundary_degradation: true
    # 是否要求能量最高点必须是严格的局部峰值
    # false: 接受能量最高点在边界的情况
    require_local_peak: false
  
  # ===== xTB Path Finder 配置 (新模式) =====
  # 使用 xTB 官方路径搜索替代 relaxed scan
  # 官方文档: xtb start.xyz --path end.xyz --input path.inp
  path_search:
    # 是否启用 xTB 路径搜索 (true=使用 path search 精修 TS)
    enabled: true
    # 路径搜索优化轮数
    nrun: 1
    # 初始路径点数
    npoint: 25
    # 精细优化步数
    anopt: 10
    # 推力 - 从反应物出发的排斥势
    kpush: 0.003
    # 拉力 - 向产物的吸引势 (负值表示吸引)
    kpull: -0.015
    # 优化器拉力
    ppull: 0.05
    # 高斯宽度
    alp: 1.2
    # 是否写入兼容别名 (reactant_complex 作为 dipolar_intermediate 的别名)
    write_legacy_reactant_alias: true
  
  # xTB 扫描引擎配置
  xtb_settings:
    # GFN-xTB 级别: 0 = GFN0, 2 = GFN2 (推荐)
    gfn_level: 2
    # 溶剂模型 (用于隐式溶剂化计算)
    solvent: acetone
    # 并行核数
    nproc: 8
    # 电子温度 (null 表示使用默认, 可设如 300)
    etemp: null

  # Gaussian+XTB 混合 TS 优化配置 (NEW)
  # 使用 Gaussian 调用 XTB 进行梯度计算，实现更精确的 TS 优化
  gau_xtb:
    enabled: false  # 设置为 true 启用 Gau_XTB TS 优化
    # Gau_XTB 脚本目录
    scripts_dir: "scripts/Gau_XTB"
    # 最大优化循环数
    max_cycles: 50
    # 最大尝试次数
    max_attempts: 3

# Step 3: Transition Analyzer (反应中心全分析)
# ================================================
# 职责:
# 1. TS 优化与验证 (Berny/QST2 + Freq)
# 2. Reactant 高精度 SP 计算
# 3. 片段提取与处理 (Opt + SP)
# 4. 生成完整能量报告
step3:
  # [NEW] 中间体 DFT 计算配置
  intermediate_opt:
    enabled: true                  # 是否计算中间体 (reactant_complex)
    charge: 0                      # 中间体电荷
    multiplicity: 1                # 中间体自旋多重度

  # Reactant 优化配置
  reactant_opt:
    enabled: true              # 启用 Reactant 优化（推荐保持 true）
    charge: 0                  # Reactant 电荷（通常为 0）
    multiplicity: 1            # 自旋多重度（通常为 1，单重态）
    enable_nbo: false          # 是否在 Freq 中集成 NBO 分析（默认关闭以节省时间）

  # Gaussian 关键词模板
  gaussian_keywords:
    berny: "Opt=(TS, CalcFC, NoEigenTest) Freq"
    qst2: "Opt=(QST2, CalcFC) Freq"
    irc: "IRC=(CalcFC, MaxPoints=50, StepSize=10)"
  
  # 严格禁用 QST2 救援策略（只使用 Berny）
  disable_qst2_rescue: true

  # 片段处理配置
  fragments:
    calculate_relaxed: true  # 是否计算松弛后的片段能量
    opt_level: xtb          # 片段几何优化级别: xtb (快) 或 dft (准)
    # VRM 相关 SP 固定资源设置
    # NOTE: ORCA MPI (orca_scf_mpi/mpirun) 在部分环境/体系上可能在 SCF 收敛后异常 abort。
    # VRM 默认强制单核运行以禁用 MPI，提升稳定性（可按需调大）。
    vrm_sp_nproc: 1

# Step 4: Feature Miner (特征提取)
step4:
  enable_buried_volume: false
  enabled_plugins:
    - thermo
    - geometry
    - qc_checks
    - ts_quality
    - step1_activation
    - step2_cyclization
    - multiwfn_features
  features:
    - dG_activation
    - dG_reaction
    - E_distortion_sub
    - E_distortion_rea
    - E_interaction
    - r1_forming
    - r2_forming
    - asynchronicity
  outputs:
    write_features_raw: true
    write_features_mlr: true
    write_feature_meta: true
  mlr:
    columns:
      - sample_id
      - thermo.dE_activation
      - thermo.dE_reaction
      - geom.r_avg
      - geom.dr
      - geom.close_contacts_density
      - ts.n_imag
      - ts.imag1_cm1_abs
      - s1_dG_act
      - s1_Keq_act
      - s1_Nconf_eff
      - s1_Sconf
      - s1_E_avg_weighted
      - s1_E_std
      - s1_tau_CH_C_O
      - s2_eps_homo
      - s2_eps_lumo
      - s2_mu
      - s2_eta
      - s2_omega
      - s2_gedt_value
      - qc.sample_weight
  strict_qc:
    enabled: false
    sample_weight_policy: downweight

  # V6.2 机理感知特征配置 (P0)
  step4_features:
    temperature_K: 298.15
    units:
      energy: "kcal/mol"
      entropy: "cal/mol/K"
    stage1:
      small_molecule_name: "HOAc"
      shermo_summary_filename: "shermo_summary.json"
      conformer_energies_filename: "conformer_energies.json"
    stage2:
      fchk_preferred: true
      cdft:
        orbital_unit: "eV"
        approx: "koopmans_orbital"
      gedt:
        sign_convention: "gedt_positive_if_electron_flows_nuc_to_elec"
        charge_priority: ["NBO", "CM5", "MULLIKEN"]
        fragment_rule: "forming_bonds_graph_cut_v1"
    multiwfn:
      enabled: false
      cache_dir: ".cache/step4_multiwfn"
      timeout_sec: 120
      modules:
        fukui: true
        dual_descriptor: true
        qtaim_bcp: false
        nci: false

# 运行模式配置 (Run Mode)
# ========================
# 控制程序运行模式：single (单分子) / batch (批量) / dataset (数据集)
run:
  source: dataset  # single: 单分子模式; batch: 批量CSV模式; dataset: 数据集模式
  # single 模式配置 (当 source=single 时使用)
  single:
    product_smiles: ""  # 产物SMILES字符串，空字符串表示需要通过命令行--smiles传入
    rx_id: "manual"     # 反应ID标识
  # batch 模式配置 (当 source=batch 时使用)
  batch:
    input_file: ""      # 输入CSV文件路径
    smiles_column: "product_smiles"  # SMILES列名
  # dataset 模式配置 (当 source=dataset 时使用)
  # JSON 文件会被自动识别 (通过 .json 后缀检测)
  dataset:
    path: "E:\\Calculations\\AI4S_ML_Studys\\[4+3] Mechain learning\\ReactionProfileHunter\\xiong_2003_gold_manul_Check.json"  # JSON 数据集文件路径
    product_smiles_col: "product_smiles"  # 产物SMILES列名 (JSON 中为 product_smiles)
    precursor_smiles_col: "substrate_smiles"  # 前体SMILES列名 (JSON 中为 substrate_smiles)
  # 通用运行选项
  output_root: ./rph_output  # 输出根目录 (会被global.work_dir_base覆盖)
  workdir_naming: "rx_{rx_id}"  # 工作目录命名模板
  resume: true        # 是否启用断点续算 (Checkpoint/Resume)
  resume_rehydrate: true # 当状态文件被删时，是否尝试从物理产物重建状态 (V6.3)
  resume_rehydrate_policy: best_effort
  resume_partial_enabled: true
  dry_run: false      # 干运行模式（仅显示任务，不执行）
  max_tasks: 1        # 最大任务数 (0=无限制, 1=只读取第一行)
  filter_ids: ["X2003-Sch2-1A"]  # 精确指定第一条数据记录

  max_workers: 1      # 并行工作进程数
  notify:
    enabled: true
    backend: auto

# 全局设置
global:
  log_level: INFO  # DEBUG, INFO, WARNING, ERROR
  work_dir_base: ./rph_output
  checkpoint: true  # 是否启用断点续算
  # 程序查找顺序：配置文件 > 环境变量 > 系统 PATH
  enable_path_search: true  # 允许自动查找（如果配置文件中的路径不存在）
  
  small_molecule_cache_dir: null

s0:
  enabled: true
  persist_graph: true
  fail_policy: degrade
  generate_intermediates: false
  enable_dr_paths: false

# ==================== Reference States (小分子参考态) ====================
# 小分子离去基团目录，用于：
#   1. Step 1 产物构象搜索时处理离去基团
#   2. 参考态能量计算 (reference_states.py)
#   3. 数据集中 ylide_leaving_group / leaving_group 字段的解析
# 配置格式：
#   <key>:           # 离去基团标识符（数据集中使用的 key，如 "AcOH"）
#     smiles: ""     # SMILES 字符串（必填）
#     charge: 0      # 电荷（默认 0）
#     multiplicity: 1  # 自旋多重度（默认 1，单重态）
reference_states:
  small_molecule_map:
    # 乙酸 (Acetic Acid) - 最常见的离去基团
    AcOH:
      smiles: "CC(=O)O"
      charge: 0
      multiplicity: 1
    
    # 三氟乙醇 (Trifluoroethanol)
    TFE:
      smiles: "OCC(F)(F)F"
      charge: 0
      multiplicity: 1
    
    # 可根据数据集需要添加其他离去基团：
    # 
    # 水 (Water)
    # H2O:
    #   smiles: "O"
    #   charge: 0
    #   multiplicity: 1
    # 
    # 甲醇 (Methanol)
    # MeOH:
    #   smiles: "CO"
    #   charge: 0
    #   multiplicity: 1
    # 
    # 甲苯磺酸 (Tosic Acid)
    # TsOH:
    #   smiles: "CC1=CC=C(C=C1)S(=O)(=O)O"
    #   charge: 0
    #   multiplicity: 1

# ==================== Reaction Profiles (反应机理配置) ====================
# 针对不同反应类型提供预置配置，key 以 "_" 开头表示内置模板
# 使用方式: 在代码中根据反应类型选择对应 profile
reaction_profiles:
  # [5+2] 环加成反应默认配置
  "[5+2]_default":
    forming_bond_count: 2
    # 扫描参数
    scan:
      scan_start_distance: 3.5
      scan_end_distance: 2.0
      scan_steps: 16
      scan_mode: concerted
      scan_force_constant: 0.8
      min_valid_points: 6
      reject_boundary_maximum: true

  # [4+3] 环加成反应默认配置
